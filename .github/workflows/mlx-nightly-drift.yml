name: MLX macOS nightly drift

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mlx-nightly-drift:
    name: MLX nightly semantic drift
    runs-on: macos-14
    timeout-minutes: 30

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install uv
      run: python -m pip install --upgrade uv

    - name: Create virtual environment
      run: uv venv --python 3.11 .venv

    - name: Install MLX nightly drift dependencies
      run: |
        uv pip install --python .venv/bin/python \
          -e source/isaaclab[macos-mlx,dev] \
          -e source/isaaclab_rl[dev] \
          -e source/isaaclab_tasks

    - name: Run nightly full-suite benchmark
      run: |
        PYTHONPATH=.:source/isaaclab .venv/bin/python \
          scripts/benchmarks/mlx/benchmark_mac_tasks.py \
          --task-group full \
          --num-envs 8 \
          --steps 8 \
          --train-updates 1 \
          --rollout-steps 4 \
          --epochs-per-update 1 \
          --json-out logs/benchmarks/mlx/nightly-full.json

    - name: Compare against committed semantic baseline
      run: |
        PYTHONPATH=.:source/isaaclab .venv/bin/python \
          scripts/benchmarks/mlx/check_semantic_drift.py \
          --results logs/benchmarks/mlx/nightly-full.json \
          --baseline scripts/benchmarks/mlx/baselines/semantic-baseline.json \
          --snapshot-out logs/benchmarks/mlx/nightly-semantic-snapshot.json \
          --report-out logs/benchmarks/mlx/nightly-semantic-report.json

    - name: Verify nightly artifact contract
      run: |
        test -f logs/benchmarks/mlx/nightly-full.json
        test -f logs/benchmarks/mlx/nightly-full-dashboard.json
        test -f logs/benchmarks/mlx/nightly-full-trend.json
        test -f logs/benchmarks/mlx/nightly-semantic-snapshot.json
        test -f logs/benchmarks/mlx/nightly-semantic-report.json
        PYTHONPATH=.:source/isaaclab .venv/bin/python - <<'PY'
        import json
        from pathlib import Path

        from isaaclab.backends.kernel_inventory import CURRENT_MAC_NATIVE_TASKS

        full_payload = json.loads(Path("logs/benchmarks/mlx/nightly-full.json").read_text(encoding="utf-8"))
        assert full_payload["task_group"] == "full"
        assert full_payload["cpu_fallback_detected"] is False
        expected_rollout = list(CURRENT_MAC_NATIVE_TASKS) + [
            "cartpole-rgb-camera",
            "cartpole-depth-camera",
            "anymal-c-flat-height-scan",
            "h1-flat-height-scan",
        ]
        expected_full = expected_rollout + ["train-cartpole"]
        assert full_payload["tasks"] == expected_full

        dashboard = json.loads(Path("logs/benchmarks/mlx/nightly-full-dashboard.json").read_text(encoding="utf-8"))
        assert dashboard["summary"]["rollout_task_count"] == len(expected_rollout)
        assert dashboard["summary"]["training_task_count"] == 1

        trend = json.loads(Path("logs/benchmarks/mlx/nightly-full-trend.json").read_text(encoding="utf-8"))
        assert {entry["task"] for entry in trend["tasks"]} == set(expected_full)

        semantic_report = json.loads(Path("logs/benchmarks/mlx/nightly-semantic-report.json").read_text(encoding="utf-8"))
        assert semantic_report["passed"] is True
        PY

    - name: Upload nightly drift artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: mlx-nightly-drift-${{ github.run_id }}
        path: logs/benchmarks/mlx
        if-no-files-found: warn
        retention-days: 30
